<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Code Slot</title>
    <link rel="icon" href="./img/icon.jpg">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background:
                radial-gradient(circle at top,
                    #1e293b 0%,
                    #0f172a 40%,
                    #020617 100%);
        }

        .container {
            text-align: center;
        }

        .title {
            color: #ffd700;
            font-size: 60px;
            margin-bottom: 30px;
            text-shadow:
                0 0 10px #ffd700,
                0 0 25px #ff9900;
        }

        .slot-machine {
            display: flex;
            gap: 20px;
            padding: 25px;
            border-radius: 30px;
            background: rgba(15, 23, 42, .8);
            backdrop-filter: blur(10px);
            border: 2px solid #007acc;
            box-shadow:
                0 0 10px #007acc,
                0 0 25px #007acc,
                0 0 50px rgba(0, 122, 204, .5),
                inset 0 0 15px rgba(255, 255, 255, .05);
        }

        .reel {
            width: 140px;
            height: 140px;
            overflow: hidden;
            position: relative;
            background: white;
            border-radius: 20px;
            border: 3px solid #007acc;
            box-shadow:
                0 0 10px #007acc,
                0 0 20px rgba(0, 122, 204, .5);
        }

        .reel::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 30px;
            z-index: 5;
            background: linear-gradient(to bottom, #14001f, transparent);
        }

        .reel::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            z-index: 5;
            background: linear-gradient(to top, #14001f, transparent);
        }

        .reel-track {
            display: flex;
            flex-direction: column;
        }

        .reel-track img {
            width: 120px;
            height: 120px;
            margin: 10px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid white;
            box-shadow:
                0 0 10px white,
                0 0 20px #ff00ff;
        }

        button {
            margin-top: 25px;
            padding: 15px 40px;
            border: none;
            border-radius: 15px;
            font-size: 22px;
            font-weight: bold;
            transition: all .3s ease;
            cursor: pointer;
            background: linear-gradient(135deg,
                    #007acc,
                    #38bdf8);

            color: white;

            box-shadow:
                0 0 10px #007acc,
                0 0 25px #007acc;
        }

        button:hover {
            transform: scale(1.05);

            box-shadow:
                0 0 20px #38bdf8,
                0 0 40px #38bdf8;
        }
        button:active{
            transform: scale(0.9);

        }

        #result {
            margin-top: 20px;
            min-height: 40px;
            color: white;
            font-size: 28px;
            font-weight: bold;
        }

        .win {
            color: #00ff88;
        }

        .lose {
            color: #ff6666;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.08);
            }

            100% {
                transform: scale(1);
            }
        }

        .jackpot {
            animation: pulse .5s infinite;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="title">CODE SLOT</div>

        <div class="slot-machine">

            <div class="reel">
                <div class="reel-track" id="track1"></div>
            </div>

            <div class="reel">
                <div class="reel-track" id="track2"></div>
            </div>

            <div class="reel">
                <div class="reel-track" id="track3"></div>
            </div>

        </div>

        <button onclick="spin()">SPIN</button>

        <div id="result"></div>

    </div>

    <script>

        const images = [
            "img/html icon.png",
            "img/CSS-Logo-2011.png",
            "img/java script logo.png",
            "img/Python-logo-notext.svg.png",
            "img/react logo.png"
        ];

        const track1 = document.getElementById("track1");
        const track2 = document.getElementById("track2");
        const track3 = document.getElementById("track3");

        function fillTrack(track) {

            for (let i = 0; i < 25; i++) {

                images.forEach(src => {

                    const img = document.createElement("img");

                    img.src = src;

                    track.appendChild(img);

                });

            }

        }

        fillTrack(track1);
        fillTrack(track2);
        fillTrack(track3);

        function spinTrack(track, duration) {

            return new Promise(resolve => {

                const winner =
                    Math.floor(Math.random() * images.length);

                const itemHeight = 140;

                const loops = 20;

                const position =
                    (loops * images.length + winner)
                    * itemHeight;

                track.style.transition =
                    `${duration}ms cubic-bezier(.17,.67,.12,.99)`;

                track.style.transform =
                    `translateY(-${position}px)`;

                setTimeout(() => {
                    resolve(winner);
                }, duration);

            });

        }

        async function spin() {

            const result =
                document.getElementById("result");

            result.className = "";
            result.innerHTML = "🎰 Aylanmoqda...";

            track1.style.transition = "none";
            track2.style.transition = "none";
            track3.style.transition = "none";

            track1.style.transform = "translateY(0)";
            track2.style.transform = "translateY(0)";
            track3.style.transform = "translateY(0)";

            void track1.offsetWidth;

            const r1 = spinTrack(track1, 2000);
            const r2 = spinTrack(track2, 3000);
            const r3 = spinTrack(track3, 4000);

            const w1 = await r1;
            const w2 = await r2;
            const w3 = await r3;

            if (w1 === w2 && w2 === w3) {

                const names = [
                    "HTML",
                    "CSS",
                    "JavaScript",
                    "Python",
                    "React"
                ];

                result.innerHTML =
                    "🎉 " + names[w1] +
                    " MASTER! 🚀";

                result.className =
                    "win jackpot";

            } else {

                result.innerHTML =
                    "😅 Qayta urinib ko'ring";

                result.className =
                    "lose";

            }

        }

    </script>

</body>

</html>
